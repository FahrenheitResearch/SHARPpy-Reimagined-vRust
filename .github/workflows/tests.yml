name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  SHARPPYRS_REV: 958bcd685b1e28b8fce0ab5c7b8daea3cdd993aa

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check out pinned SHARPpyRS
        uses: actions/checkout@v7
        with:
          repository: FahrenheitResearch/sharppyrs
          ref: ${{ env.SHARPPYRS_REV }}
          path: native/sharppyrs

      - name: Apply pinned sharppyrs parity fixes
        run: |
          git -C native/sharppyrs apply ../patches/sharppyrs-ecape-el.patch
          git -C native/sharppyrs apply ../patches/sharppyrs-sharppy-parity.patch

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install bulk native analysis
        run: |
          cargo build --release --locked --manifest-path native/sharpmod-native/Cargo.toml
          python packaging/install_native_extension.py
          python -c "from sharpmod import sharpmod_native as n; assert n.runtime_check(); assert n.__version__ == '0.3.2'"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,era5,wrf,render]"
          python -m pip install --no-deps "SHARPpy==1.4.0a5"

      - name: Run tests
        run: pytest
